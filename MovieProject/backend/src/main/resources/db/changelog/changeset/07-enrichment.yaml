databaseChangeLog:
  - changeSet:
      id: create-external-sources-table
      author: Hiraeth
      changes:
        - createTable:
            tableName: external_source
            columns:
              - column: { name: id, type: BIGINT AUTO_INCREMENT, constraints: { primaryKey: true } }
              - column: { name: movie_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: url, type: VARCHAR(500), constraints: {nullable: false} }
              - column: { name: platform, type: VARCHAR(100), constraints: { nullable: false } }
              - column: { name: logo_url, type: VARCHAR(500) }
        - addForeignKeyConstraint:
            baseTableName: external_source
            baseColumnNames: movie_id
            referencedTableName: movie
            referencedColumnNames: id
            constraintName: fk_external_source_movie
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: external_source
            columnNames: movie_id, url
            constraintName: uq_movie_source

  - changeSet:
      id: add-details-to-movie
      author: Hiraeth
      changes:
        - addColumn:
            tableName: movie
            columns:
              - column: { name: details_loaded_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
              - column: { name: rating_kinopoisk, type: FLOAT }
              - column: { name: rating_imdb, type: FLOAT }
              - column: { name: avg_rating, type: FLOAT}
              - column: { name: ratings_count, type: FLOAT}

  - changeSet:
      id: delete-useless-column
      author: Hiraeth
      changes:
        - dropColumn:
            tableName: genre
            columnName: kinopoisk_id

        - dropColumn:
            tableName: country
            columnName: kinopoisk_id
