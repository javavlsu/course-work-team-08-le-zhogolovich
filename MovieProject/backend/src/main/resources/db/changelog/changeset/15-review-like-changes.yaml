databaseChangeLog:
  - changeSet:
      id: add-audit-to-review-like
      author: Hiraeth
      changes:
        - addColumn:
            tableName: review_like
            columns:
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP