databaseChangeLog:
  - changeSet:
      id: create-movie
      author: Hiraeth
      changes:
        - createTable:
            tableName: movie
            columns:
              - column: { name: id, type: BIGINT AUTO_INCREMENT, constraints: { primaryKey: true } }
              - column: { name: kinopoisk_id, type: INT, constraints: { nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: original_name, type: VARCHAR(255) }
              - column: { name: release_year, type: INT }
              - column: { name: poster_url, type: VARCHAR(500) }
              - column: { name: overview, type: TEXT }

  - changeSet:
      id: create-genre
      author: Hiraeth
      changes:
        - createTable:
            tableName: genre
            columns:
              - column: { name: id, type: BIGINT AUTO_INCREMENT, constraints: { primaryKey: true } }
              - column: { name: kinopoisk_id, type: INT }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false, unique: true } }

  - changeSet:
      id: create-country
      author: Hiraeth
      changes:
        - createTable:
            tableName: country
            columns:
              - column: { name: id, type: BIGINT AUTO_INCREMENT, constraints: { primaryKey: true } }
              - column: { name: kinopoisk_id, type: INT }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false, unique: true } }

  - changeSet:
      id: create-tag
      author: Hiraeth
      changes:
        - createTable:
            tableName: tag
            columns:
              - column: { name: id, type: BIGINT AUTO_INCREMENT, constraints: { primaryKey: true } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false, unique: true } }
              - column: { name: type, type: VARCHAR(30), constraints: { nullable: false } }
              - column: { name: created_at, type: DATETIME, constraints: { nullable: false } }
              - column: { name: updated_at, type: DATETIME }

  - changeSet:
      id: create-review
      author: Hiraeth
      changes:
        - createTable:
            tableName: review
            columns:
              - column:
                  name: id
                  type: BIGINT AUTO_INCREMENT
                  constraints:
                    primaryKey: true
              - column:
                  name: movie_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(500)
              - column:
                  name: content
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: rating
                  type: INT
              - column:
                  name: status
                  type: VARCHAR(20)
              - column:
                  name: created_at
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME

        - addForeignKeyConstraint:
            constraintName: fk_review_movie
            baseTableName: review
            baseColumnNames: movie_id
            referencedTableName: movie
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            constraintName: fk_review_user
            baseTableName: review
            baseColumnNames: user_id
            referencedTableName: user
            referencedColumnNames: id
            onDelete: CASCADE

        - createIndex:
            tableName: review
            indexName: idx_review_movie
            columns:
              - column:
                  name: movie_id

        - createIndex:
            tableName: review
            indexName: idx_review_user
            columns:
              - column:
                  name: user_id